name: Java CI

on: [ push ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          java-version: 24
          distribution: 'temurin'
          cache: 'maven'
      - name: Build & Install
        run: mvn --batch-mode install -DskipTests --no-transfer-progress
      - name: Install Browsers
        run: mvn exec:java --projects=test --errors -Dexec.mainClass=com.microsoft.playwright.CLI
          -Dexec.classpathScope=test -Dexec.args="install --with-deps webkit"
      - name: Run Tests
        run: mvn test
      - name: Upload Playwright Trace
        if: always() # even if tests fail
        uses: actions/upload-artifact@v5
        with:
          name: playwright-trace
          path: openapi-ui.test/target/playwright/trace.zip
