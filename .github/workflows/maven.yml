name: Java CI

on: [ push ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: 24
          distribution: 'temurin'
          cache: 'maven'
      - name: Build & Install
        run: mvn --batch-mode install -DskipTests --no-transfer-progress
      - name: Install Browsers
        run: mvn exec:java --projects=openapi-ui.test --errors -Dexec.mainClass=com.microsoft.playwright.CLI \
          -Dexec.classpathScope=test -Dexec.args="install --with-deps webkit"
      - name: Run Tests
        run: mvn test
